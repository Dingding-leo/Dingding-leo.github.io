name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify KnightLab export
        run: |
          test -f out/KnightLab/index.html
          test -f out/KnightLab/test.html
          test -f out/KnightLab/manifest.webmanifest
          test -f out/KnightLab/registerSW.js
          test -f out/KnightLab/sw.js
          grep -q '/KnightLab/assets/' out/KnightLab/index.html
          grep -q '"start_url":"/KnightLab/"' out/KnightLab/manifest.webmanifest
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
