name: Publish KnightLab preview

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-knightlab.yml
      - .knightlab-publish-trigger
  workflow_dispatch:
  schedule:
    - cron: '25 21 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: publish-knightlab-preview
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Austin's site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Check out KnightClub
        uses: actions/checkout@v4
        with:
          repository: Dingding-leo/KnightClub
          ref: main
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Verify KnightClub
        working-directory: source
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build for the project subpath
        working-directory: source
        env:
          KNIGHTCLUB_BASE: /KnightLab/
        run: npm run build:pages

      - name: Validate release root
        run: |
          test -f source/dist/client/index.html
          test -f source/dist/client/test.html
          test -f source/dist/client/manifest.webmanifest
          test -f source/dist/client/sw.js
          test -f source/dist/client/stockfish/stockfish-18-lite-single.wasm
          grep -q '/KnightLab/assets/' source/dist/client/index.html
          grep -q '"start_url":"/KnightLab/"' source/dist/client/manifest.webmanifest
          ! grep -q '/KnightClub/' source/dist/client/index.html

      - name: Refresh site checkout and stage generated assets
        run: |
          git -C site pull --rebase origin main
          rm -rf site/public/KnightLab
          mkdir -p site/public/KnightLab
          cp -R source/dist/client/. site/public/KnightLab/
          cp source/dist/client/index.html site/public/KnightLab/404.html

      - name: Commit generated preview
        working-directory: site
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- public/KnightLab
          if git diff --cached --name-only | grep -qv '^public/KnightLab/'; then
            echo 'Refusing to publish files outside public/KnightLab.' >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            echo 'KnightLab preview is already current.'
            exit 0
          fi
          git commit -m 'deploy: publish KnightLab web preview'
          git pull --rebase origin main
          git push

      # A commit made with GITHUB_TOKEN does not itself invoke this separate
      # workflow. Dispatch it explicitly so the generated subpath artifact is
      # always the Pages deployment, not merely a repository update.
      - name: Deploy the updated Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run .github/workflows/deploy.yml --repo "$GITHUB_REPOSITORY" --ref main
