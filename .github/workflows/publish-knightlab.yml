name: Publish KnightLab preview

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-knightlab.yml
      - .knightlab-publish-trigger
  workflow_dispatch:
  schedule:
    - cron: '25 21 * * *'

permissions:
  contents: write

concurrency:
  group: publish-knightlab-preview
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Austin's site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Check out KnightLab
        uses: actions/checkout@v4
        with:
          repository: Dingding-leo/KnightLab
          ref: main
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: source
        run: npm install --no-audit --no-fund

      - name: Verify KnightLab
        working-directory: source
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Build for the project subpath
        working-directory: source
        env:
          KNIGHTLAB_BASE: /KnightLab/
        run: npm run build

      - name: Validate release root
        run: |
          test -f source/dist/index.html
          test -f source/dist/test.html
          test -f source/dist/manifest.webmanifest
          grep -q '/KnightLab/' source/dist/index.html

      - name: Stage inside Next.js public assets
        run: |
          rm -rf site/public/KnightLab
          mkdir -p site/public/KnightLab
          cp -R source/dist/. site/public/KnightLab/
          cp source/dist/index.html site/public/KnightLab/404.html

      - name: Commit generated preview
        working-directory: site
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/KnightLab
          if git diff --cached --quiet; then
            echo 'KnightLab preview is already current.'
            exit 0
          fi
          git commit -m 'deploy: publish KnightLab web preview'
          git push
